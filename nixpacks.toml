[phases.setup]
nixPkgs = [
  "libGL",
  "glib",
  "libxcb",
  "libglvnd",
  "mesa",
  "libSM",
  "libXext",
  "libXrender",
  "zlib",
  "python311"
]

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
LD_LIBRARY_PATH = "/nix/var/nix/profiles/default/lib:/usr/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]